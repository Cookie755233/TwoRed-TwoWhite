# Hugo configuration file
title: Two Reds, Two Whites

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

pagination:
  pagerSize: 10

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

    extensions:
      passthrough:
        delimiters:
          block: [['\[', '\]'], ["$$", "$$"]]
          inline: [['\(', '\)']]
        enable: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

    extensions:
      passthrough:
        delimiters:
          block: [['\[', '\]'], ["$$", "$$"]]
          inline: [['\(', '\)']]
        enable: true

menu:
  main:
    - name: Docs
      pageRef: /docs
      weight: 1
    - name: Blogs
      pageRef: /blog
      weight: 2
    - name: About
      pageRef: /about
      weight: 3
    # - name: Contact ↗
    #   url: "mailto:w.cookie755233@gmail.com"
    #   weight: 4
    - name: Search
      weight: 5
      params:
        type: search
    # - name: GitHub
    #   weight: 6
    #   url: "https://github.com/Cookie755233/TwoRed-TwoWhite"
    #   params:
    #     icon: github

enableGitInfo: true

params:
  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: images/logo.svg
      dark: images/logo.svg
      width: 20
      height: 20
      link: /

  footer:
    displayCopyright: false
    displayPoweredBy: false

  editURL:
    enable: false
    # base: "https://github.com/Cookie755233/TwoRed-TwoWhite/edit/main/content"

  imageZoom:
    enable: true

  theme:
    default: system
    displayToggle: false

  toc:
    displayTags: true

  displayUpdatedDate: true
  dateFormat: "January 2, 2006"
  displayUpdatedAuthor: false
